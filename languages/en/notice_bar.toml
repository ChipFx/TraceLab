# languages/en/notice_bar.toml
# Notice definitions for the notice bar widget.
#
# Each notice is a TOML table named [notice_<KEY>] where <KEY> is the
# internal identifier used in code (e.g. "realtime_no_date").
#
# Required fields:
#   source  - The Qt source string passed to QCoreApplication.translate("notices", ...).
#             This MUST be the English text exactly as it appears in
#             translations/strings_notices.py, so pylupdate6 can match them.
#             At runtime, if no QTranslator is installed (English app),
#             Qt returns this string verbatim — no .qm file needed for English.
#   type    - Colour-set name from _colour.toml.
#             One of: user_notice, user_warning, user_error,
#                     program_info, program_warning, program_error
#
# Optional override fields (empty string = use type's colour from _colour.toml):
#   fg_override  - Override foreground colour (#rrggbb)
#   bg_override  - Override background colour (#rrggbb)
#   acc_override - Override accent colour (#rrggbb)

[notice_realtime_no_date]
# Indicates on the notice bar that the application fell back to standard
# time indication, because the source data did not have a date set.
source      = "Real Time mode enabled without known date"
type        = "user_warning"
fg_override  = ""
bg_override  = ""
acc_override = ""
